<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indie Hacker Radar — StillNotAThing</title>
<meta name="description" content="Today's GitHub trending, MRR milestones, build-in-public updates, and security alerts for indie hackers.">
<meta property="og:title" content="Indie Hacker Radar — StillNotAThing">
<meta property="og:description" content="Real-time radar: launches, trending repos, MRR wins, and security alerts for indie hackers.">
<meta property="og:url" content="https://stillnotathing.com/radar.html">
<link rel="canonical" href="https://stillnotathing.com/radar.html">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--surface:#111118;--card:#13131f;--border:#1e1e2e;--text:#e8e8f0;--muted:#6b6b80;--accent:#00d4aa;--accent2:#7c5cfc;--up:#22c55e;--down:#ef4444;--warn:#f59e0b}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
header{background:rgba(10,10,15,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-family:'JetBrains Mono',monospace;font-size:.85rem;color:var(--accent);text-decoration:none}
.back{font-size:.78rem;color:var(--muted);text-decoration:none}
.main{padding:20px;max-width:900px;margin:0 auto}
.hero{padding:20px 0 16px;border-bottom:1px solid var(--border);margin-bottom:20px}
.hero-date{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--accent);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
.hero-title{font-size:1.6rem;font-weight:700;letter-spacing:-1px;margin-bottom:6px}
.hero-sub{color:var(--muted);font-size:.85rem}
.tabs{display:flex;gap:2px;margin-bottom:20px;background:var(--surface);border-radius:10px;padding:4px;overflow-x:auto}
.tab{padding:8px 16px;font-size:.78rem;font-weight:500;color:var(--muted);cursor:pointer;border-radius:7px;transition:all .15s;white-space:nowrap}
.tab.active{background:var(--bg);color:var(--accent);font-weight:600}
.section{display:none}.section.active{display:block}
.item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;transition:border-color .15s}
.item:hover{border-color:#2e2e40}
.item-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
.item-title{font-size:.88rem;font-weight:600;line-height:1.3;color:var(--text)}
.item-desc{font-size:.75rem;color:var(--muted);line-height:1.5;margin-bottom:8px}
.item-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--muted)}
.tag{font-size:.62rem;padding:2px 7px;border-radius:3px;font-family:'JetBrains Mono',monospace}
.tag-gh{background:rgba(107,107,128,.1);color:var(--muted)}
.tag-mrr{background:rgba(34,197,94,.1);color:var(--up)}
.tag-bip{background:rgba(124,92,252,.1);color:var(--accent2)}
.tag-sec{background:rgba(239,68,68,.1);color:var(--down)}
.btn-sm{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:4px 8px;border-radius:5px;font-size:.68rem;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.btn-sm:hover{border-color:var(--accent);color:var(--accent)}
.mrr-amount{font-family:'JetBrains Mono',monospace;font-size:1.3rem;font-weight:700;color:var(--up);margin-bottom:4px}
.security-item{background:rgba(239,68,68,.04);border:1px solid rgba(239,68,68,.15);border-radius:10px;padding:14px;margin-bottom:10px}
.severity-HIGH{color:var(--down)}
.severity-MEDIUM{color:var(--warn)}
.severity-LOW{color:var(--muted)}
.empty{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:24px;text-align:center;color:var(--muted);font-size:.82rem}
.loading{text-align:center;padding:24px;color:var(--muted);font-size:.75rem;font-family:'JetBrains Mono',monospace}
.last-updated{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--muted);margin-bottom:12px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--accent);color:var(--text);padding:10px 20px;border-radius:8px;font-size:.8rem;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<header>
  <a href="/" class="logo">⚡ StillNotAThing</a>
  <a href="/" class="back">← Home</a>
</header>

<div class="main">
  <div class="hero">
    <div class="hero-date" id="hero-date">INDIE HACKER RADAR // Loading...</div>
    <h1 class="hero-title">What's happening today</h1>
    <p class="hero-sub">Real data from GitHub, Reddit, and security feeds — updated daily at 7AM KST.</p>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('hn',this)">🚀 Show HN</div>
    <div class="tab" onclick="switchTab('gh',this)">⭐ Trending</div>
    <div class="tab" onclick="switchTab('mrr',this)">💰 MRR Wins</div>
    <div class="tab" onclick="switchTab('bip',this)">🏗️ Build in Public</div>
    <div class="tab" onclick="switchTab('security',this)">🔒 Security</div>
  </div>

  <div class="section active" id="section-hn">
    <div id="hn-container"><div class="loading">Loading Show HN...</div></div>
  </div>
  <div class="section" id="section-gh">
    <div id="gh-container"><div class="loading">Loading...</div></div>
  </div>
  <div class="section" id="section-mrr">
    <div id="mrr-container"><div class="loading">Loading...</div></div>
  </div>
  <div class="section" id="section-bip">
    <div id="bip-container"><div class="loading">Loading...</div></div>
  </div>
  <div class="section" id="section-security">
    <div id="security-container"><div class="loading">Loading...</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://xlxztrnpmzklbnyfkrze.supabase.co';
const SUPABASE_KEY = 'sb_publishable_RYLor2fbXqj4aHhSW0vCsw_7ZfP2a58';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const now = new Date();
document.getElementById('hero-date').textContent = `INDIE HACKER RADAR // ${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function share(title, url) {
  if (navigator.share) navigator.share({ title, url });
  else { navigator.clipboard.writeText(url); toast('Link copied! ✓'); }
}

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const h = Math.floor(diff / 3600000);
  const d = Math.floor(h / 24);
  if (d > 0) return d + 'd ago';
  if (h > 0) return h + 'h ago';
  return 'just now';
}

const loaded = {};
function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('section-' + tab).classList.add('active');
  if (!loaded[tab]) { loaded[tab] = true; loaders[tab](); }
}

const loaders = {
  hn: loadHN,
  gh: loadGitHubTrending,
  mrr: loadMRR,
  bip: loadBIP,
  security: loadSecurity
};

// Show HN (HN Algolia API - real data)
async function loadHN() {
  const c = document.getElementById('hn-container');
  try {
    const res = await fetch('https://hn.algolia.com/api/v1/search?tags=show_hn&hitsPerPage=15&numericFilters=points>10');
    const data = await res.json();
    if (!data.hits || !data.hits.length) {
      c.innerHTML = '<div class="empty">No Show HN posts found right now.</div>';
      return;
    }
    c.innerHTML = `<div class="last-updated">Live from Hacker News · ${data.hits.length} posts</div>` +
      data.hits.map((h, i) => `
        <div class="item">
          <div class="item-header">
            <div>
              <div class="item-meta" style="margin-bottom:5px">
                <span class="tag" style="background:rgba(255,102,0,.1);color:#ff6600">Show HN</span>
                <span>⬆ ${h.points} pts</span>
                <span>💬 ${h.num_comments} comments</span>
                <span>${timeAgo(h.created_at)}</span>
              </div>
              <div class="item-title">${h.title.replace('Show HN: ','')}</div>
            </div>
          </div>
          <div class="item-meta">
            ${h.url ? `<a href="${h.url}" target="_blank" style="color:var(--accent);text-decoration:none;font-size:.72rem">View project →</a>` : ''}
            <a href="https://news.ycombinator.com/item?id=${h.objectID}" target="_blank" style="color:var(--muted);text-decoration:none;font-size:.72rem">HN discussion →</a>
            <button class="btn-sm" onclick="share('${h.title.replace(/'/g,"\\'")}','https://stillnotathing.com/radar.html?item=${h.objectID}')">↗ share</button>
          </div>
        </div>`).join('');
  } catch(e) {
    c.innerHTML = '<div class="empty">Could not load Show HN posts. Try again later.</div>';
  }
}

// GitHub Trending (Supabase - collected daily)
async function loadGitHubTrending() {
  const c = document.getElementById('gh-container');
  try {
    const { data, error } = await sb.from('trending_repos').select('*').order('collected_at', { ascending: false }).limit(20);
    if (error || !data || !data.length) {
      c.innerHTML = '<div class="empty">GitHub trending data is collected daily at 7AM KST. Check back tomorrow!</div>';
      return;
    }
    const latest = data[0].collected_at;
    c.innerHTML = `<div class="last-updated">Collected ${timeAgo(latest)} · ${data.length} repos</div>` +
      data.map(r => `
        <div class="item">
          <div class="item-header">
            <div style="flex:1">
              <div class="item-meta" style="margin-bottom:5px">
                <span class="tag tag-gh">${r.language || 'Unknown'}</span>
                ${r.stars_today ? `<span style="color:var(--up)">${r.stars_today}</span>` : ''}
              </div>
              <div class="item-title">${r.name}</div>
              ${r.description ? `<div class="item-desc">${r.description}</div>` : ''}
            </div>
          </div>
          <div class="item-meta">
            <a href="${r.url}" target="_blank" style="color:var(--accent);text-decoration:none;font-size:.72rem">View on GitHub →</a>
            <button class="btn-sm" onclick="share('${r.name.replace(/'/g,"\\'")}','${r.url}')">↗ share</button>
          </div>
        </div>`).join('');
  } catch(e) {
    c.innerHTML = '<div class="empty">Could not load trending data.</div>';
  }
}

// MRR Milestones (Supabase - collected from Reddit)
async function loadMRR() {
  const c = document.getElementById('mrr-container');
  try {
    const { data, error } = await sb.from('mrr_milestones').select('*').order('collected_at', { ascending: false }).limit(10);
    if (error || !data || !data.length) {
      c.innerHTML = '<div class="empty">MRR milestone data is collected daily from Reddit and Indie Hackers. Check back tomorrow!</div>';
      return;
    }
    const latest = data[0].collected_at;
    c.innerHTML = `<div class="last-updated">Sourced from Reddit · Updated ${timeAgo(latest)}</div>` +
      data.map(m => `
        <div class="item" style="border-color:rgba(34,197,94,.15)">
          <div class="mrr-amount">${m.amount}</div>
          <div class="item-title" style="margin-bottom:6px">${m.title}</div>
          <div class="item-desc">${m.description}</div>
          <div class="item-meta">
            <span class="tag tag-mrr">${m.source || 'Community'}</span>
            ${m.source_url ? `<a href="${m.source_url}" target="_blank" style="color:var(--accent);text-decoration:none;font-size:.72rem">Source →</a>` : ''}
            <button class="btn-sm" onclick="share('${(m.title||'').replace(/'/g,"\\'")}','https://stillnotathing.com/radar.html')">↗ share</button>
          </div>
        </div>`).join('');
  } catch(e) {
    c.innerHTML = '<div class="empty">Could not load MRR data.</div>';
  }
}

// Build in Public (Supabase)
async function loadBIP() {
  const c = document.getElementById('bip-container');
  try {
    const { data, error } = await sb.from('bip_updates').select('*').order('collected_at', { ascending: false }).limit(10);
    if (error || !data || !data.length) {
      c.innerHTML = '<div class="empty">Build in public updates are collected daily from Reddit and community feeds. Check back tomorrow!</div>';
      return;
    }
    const latest = data[0].collected_at;
    c.innerHTML = `<div class="last-updated">Sourced from Reddit · Updated ${timeAgo(latest)}</div>` +
      data.map(b => `
        <div class="item">
          <div class="item-header">
            <div>
              <div class="item-meta" style="margin-bottom:5px">
                <span class="tag tag-bip">${b.metric || 'Update'}</span>
                <span>${b.source || 'Community'}</span>
              </div>
              <div class="item-title">${b.handle}</div>
              <div class="item-desc">${b.content}</div>
            </div>
          </div>
          <div class="item-meta">
            <button class="btn-sm" onclick="share('${(b.handle||'').replace(/'/g,"\\'")}','https://stillnotathing.com/radar.html')">↗ share</button>
          </div>
        </div>`).join('');
  } catch(e) {
    c.innerHTML = '<div class="empty">Could not load build in public data.</div>';
  }
}

// Security Alerts (Supabase - from GitHub Advisory)
async function loadSecurity() {
  const c = document.getElementById('security-container');
  try {
    const { data, error } = await sb.from('security_alerts').select('*').order('published_at', { ascending: false }).limit(10);
    if (error || !data || !data.length) {
      c.innerHTML = '<div class="empty">No active security alerts for indie hacker stacks right now. ✅</div>';
      return;
    }
    c.innerHTML = data.map(a => `
      <div class="security-item">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span>🚨</span>
          <span class="severity-${a.severity}" style="font-family:JetBrains Mono,monospace;font-size:.7rem;font-weight:700">[${a.severity}]</span>
          <span style="font-size:.85rem;font-weight:700;color:var(--text)">${a.title}</span>
        </div>
        ${a.description ? `<div class="item-desc">${a.description}</div>` : ''}
        <div class="item-meta">
          ${a.affected ? `<span>Affects: ${a.affected}</span>` : ''}
          ${a.cve_id ? `<span>${a.cve_id}</span>` : ''}
          <span>${timeAgo(a.published_at)}</span>
          ${a.source_url ? `<a href="${a.source_url}" target="_blank" style="color:var(--accent);text-decoration:none;font-size:.72rem">Details →</a>` : ''}
          <button class="btn-sm" onclick="share('${(a.title||'').replace(/'/g,"\\'")}','https://stillnotathing.com/radar.html')">↗ share</button>
        </div>
      </div>`).join('');
  } catch(e) {
    c.innerHTML = '<div class="empty">Could not load security data.</div>';
  }
}

// 초기 로드
loadHN();
loaded['hn'] = true;
</script>
</body>
</html>
