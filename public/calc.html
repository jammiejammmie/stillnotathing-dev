<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indie Hacker Stack Cost Calculator — StillNotAThing</title>
<meta name="description" content="Calculate your exact monthly SaaS stack costs. Vercel, Supabase, Stripe, Railway, Clerk, Resend and more.">
<meta property="og:title" content="Indie Hacker Stack Cost Calculator">
<meta property="og:description" content="How much does your stack actually cost? Calculate and share your indie hacker stack.">
<meta property="og:url" content="https://stillnotathing.com/calc">
<link rel="canonical" href="https://stillnotathing.com/calc">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--surface:#111118;--card:#13131f;--border:#1e1e2e;--text:#e8e8f0;--muted:#6b6b80;--accent:#00d4aa;--accent2:#7c5cfc;--up:#22c55e;--down:#ef4444;--warn:#f59e0b}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
header{background:rgba(10,10,15,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-family:'JetBrains Mono',monospace;font-size:.85rem;color:var(--accent);text-decoration:none}
.back{font-size:.78rem;color:var(--muted);text-decoration:none}
.main{padding:20px;max-width:700px;margin:0 auto}
.hero{padding:24px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px;text-align:center}
.hero-title{font-size:1.8rem;font-weight:700;letter-spacing:-1px;margin-bottom:8px}
.hero-sub{color:var(--muted);font-size:.88rem}
.tool-grid{display:grid;gap:10px;margin-bottom:24px}
.tool-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;align-items:center;gap:12px}
.tool-icon{font-size:1.2rem;width:36px;text-align:center}
.tool-info{flex:1}
.tool-name{font-size:.9rem;font-weight:600;margin-bottom:2px}
.tool-tiers{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.tier-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:5px;font-size:.7rem;cursor:pointer;transition:all .15s;font-family:'JetBrains Mono',monospace}
.tier-btn:hover{border-color:var(--accent);color:var(--accent)}
.tier-btn.selected{background:rgba(0,212,170,.1);border-color:var(--accent);color:var(--accent)}
.tier-btn.free.selected{background:rgba(34,197,94,.1);border-color:var(--up);color:var(--up)}
.summary{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px;position:sticky;bottom:20px}
.summary-title{font-family:'JetBrains Mono',monospace;font-size:.65rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:14px}
.summary-total{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.total-label{font-size:.88rem;color:var(--muted)}
.total-amount{font-family:'JetBrains Mono',monospace;font-size:2rem;font-weight:700;color:var(--accent)}
.total-period{font-size:.72rem;color:var(--muted)}
.summary-breakdown{border-top:1px solid var(--border);padding-top:12px;margin-bottom:16px}
.breakdown-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:.8rem}
.breakdown-name{color:var(--muted)}
.breakdown-amount{font-family:'JetBrains Mono',monospace;font-weight:600}
.breakdown-amount.free{color:var(--up)}
.share-section{display:flex;gap:8px}
.btn-share{flex:1;background:var(--accent);border:none;color:#000;padding:10px;border-radius:8px;font-weight:700;font-size:.82rem;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-copy{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:10px 14px;border-radius:8px;font-size:.82rem;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-copy:hover{border-color:var(--accent);color:var(--accent)}
.comparison{background:rgba(124,92,252,.05);border:1px solid rgba(124,92,252,.15);border-radius:8px;padding:12px;margin-bottom:20px;font-size:.78rem;color:var(--muted)}
.comparison strong{color:var(--accent2)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--accent);color:var(--text);padding:10px 20px;border-radius:8px;font-size:.8rem;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<header>
  <a href="/" class="logo">⚡ StillNotAThing</a>
  <a href="/" class="back">← Home</a>
</header>

<div class="main">
  <div class="hero">
    <h1 class="hero-title">💰 Stack Cost Calculator</h1>
    <p class="hero-sub">How much does your indie hacker stack actually cost?</p>
  </div>

  <div id="tool-grid" class="tool-grid"></div>

  <div class="summary">
    <div class="summary-title">// Your stack cost</div>
    <div class="summary-total">
      <div>
        <div class="total-label">Monthly total</div>
        <div class="total-period">Annual: <span id="annual-cost">$0</span></div>
      </div>
      <div class="total-amount">$<span id="monthly-cost">0</span></div>
    </div>
    <div class="summary-breakdown" id="breakdown"></div>
    <div class="comparison" id="comparison"></div>
    <div class="share-section">
      <button class="btn-share" onclick="shareStack()">↗ Share my stack cost</button>
      <button class="btn-copy" onclick="copyBadge()">Copy README badge</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const tools = [
  {
    id: 'vercel', name: 'Vercel', icon: '⬡', category: 'Hosting',
    tiers: [
      { name: 'Free', price: 0, limit: '100GB bandwidth' },
      { name: 'Pro $20', price: 20, limit: '$20/user/mo' },
      { name: 'Team $20×', price: 40, limit: '2 seats' }
    ]
  },
  {
    id: 'supabase', name: 'Supabase', icon: '🗄', category: 'Database',
    tiers: [
      { name: 'Free', price: 0, limit: '500MB DB' },
      { name: 'Pro $25', price: 25, limit: '8GB DB' },
      { name: 'Team $599', price: 599, limit: 'Unlimited' }
    ]
  },
  {
    id: 'netlify', name: 'Netlify', icon: '🌐', category: 'Hosting',
    tiers: [
      { name: 'Free', price: 0, limit: '100GB/mo' },
      { name: 'Pro $19', price: 19, limit: '1TB/mo' },
      { name: 'Business $99', price: 99, limit: 'Unlimited' }
    ]
  },
  {
    id: 'stripe', name: 'Stripe', icon: '💳', category: 'Payments',
    tiers: [
      { name: '2.9%+30¢', price: 0, limit: 'Pay per transaction' },
      { name: '$500 MRR ≈$15', price: 15, limit: 'Est. at $500 MRR' },
      { name: '$2K MRR ≈$60', price: 60, limit: 'Est. at $2K MRR' }
    ]
  },
  {
    id: 'railway', name: 'Railway', icon: '🚂', category: 'Hosting',
    tiers: [
      { name: 'Free $5cr', price: 0, limit: '$5 credits/mo' },
      { name: 'Hobby $5', price: 5, limit: '$5/mo + usage' },
      { name: 'Pro $20', price: 20, limit: '$20/mo + usage' }
    ]
  },
  {
    id: 'clerk', name: 'Clerk', icon: '🔑', category: 'Auth',
    tiers: [
      { name: 'Free', price: 0, limit: '10K MAU' },
      { name: 'Pro $25', price: 25, limit: '25K MAU' },
      { name: 'Enterprise', price: 99, limit: 'Unlimited' }
    ]
  },
  {
    id: 'resend', name: 'Resend', icon: '📧', category: 'Email',
    tiers: [
      { name: 'Free', price: 0, limit: '3K emails/mo' },
      { name: 'Pro $20', price: 20, limit: '50K emails/mo' },
      { name: 'Business $90', price: 90, limit: '200K emails/mo' }
    ]
  },
  {
    id: 'cloudflare', name: 'Cloudflare', icon: '☁️', category: 'CDN/DNS',
    tiers: [
      { name: 'Free', price: 0, limit: 'Unlimited bandwidth' },
      { name: 'Pro $20', price: 20, limit: 'WAF + analytics' },
      { name: 'Business $200', price: 200, limit: 'SLA' }
    ]
  },
  {
    id: 'github', name: 'GitHub', icon: '⚙', category: 'Code',
    tiers: [
      { name: 'Free', price: 0, limit: 'Public repos' },
      { name: 'Pro $4', price: 4, limit: 'Private repos' },
      { name: 'Team $4/user', price: 8, limit: '2 users' }
    ]
  },
  {
    id: 'cursor', name: 'Cursor', icon: '🖱️', category: 'AI Coding',
    tiers: [
      { name: 'Free', price: 0, limit: 'Limited' },
      { name: 'Pro $20', price: 20, limit: '500 fast reqs/mo' },
      { name: 'Business $40', price: 40, limit: 'Team' }
    ]
  }
];

const selected = {};
tools.forEach(t => { selected[t.id] = 0; }); // default: free tier

function renderTools() {
  const grid = document.getElementById('tool-grid');
  grid.innerHTML = tools.map(t => `
    <div class="tool-item">
      <div class="tool-icon">${t.icon}</div>
      <div class="tool-info">
        <div class="tool-name">${t.name} <span style="font-size:.65rem;color:var(--muted);font-family:monospace">${t.category}</span></div>
        <div class="tool-tiers">
          ${t.tiers.map((tier, i) => `
            <button class="tier-btn ${i === 0 ? 'free' : ''} ${selected[t.id] === i ? 'selected' : ''}"
              onclick="selectTier('${t.id}', ${i}, ${tier.price}, this)"
              title="${tier.limit}">
              ${tier.name}
            </button>
          `).join('')}
          <button class="tier-btn ${selected[t.id] === -1 ? 'selected' : ''}"
            onclick="selectTier('${t.id}', -1, 0, this)"
            title="Don't use this tool">
            ✕ Skip
          </button>
        </div>
      </div>
    </div>
  `).join('');
}

function selectTier(toolId, tierIndex, price, btn) {
  selected[toolId] = tierIndex;
  const tool = tools.find(t => t.id === toolId);
  // Update buttons
  btn.closest('.tool-tiers').querySelectorAll('.tier-btn').forEach((b, i) => {
    b.classList.remove('selected');
  });
  btn.classList.add('selected');
  updateTotal();
}

function updateTotal() {
  let total = 0;
  const items = [];

  tools.forEach(t => {
    const idx = selected[t.id];
    if (idx === -1) return;
    const tier = t.tiers[idx];
    total += tier.price;
    items.push({ name: t.name, price: tier.price, tierName: tier.name });
  });

  document.getElementById('monthly-cost').textContent = total;
  document.getElementById('annual-cost').textContent = '$' + (total * 12).toLocaleString();

  // Breakdown
  const breakdown = document.getElementById('breakdown');
  breakdown.innerHTML = items.map(item => `
    <div class="breakdown-item">
      <span class="breakdown-name">${item.name} (${item.tierName})</span>
      <span class="breakdown-amount ${item.price === 0 ? 'free' : ''}">${item.price === 0 ? 'FREE' : '$' + item.price}</span>
    </div>
  `).join('');

  // Comparison
  const comp = document.getElementById('comparison');
  if (total === 0) {
    comp.innerHTML = '🎉 <strong>$0/month!</strong> You\'re on all free tiers. Upgrade when you hit the limits.';
  } else if (total < 50) {
    comp.innerHTML = `💡 At <strong>$${total}/mo</strong>, you need <strong>$${total * 12}/yr ARR</strong> just to cover tools. Achievable at ${Math.ceil(total/0.029)}+ paying users at $1.`;
  } else if (total < 200) {
    comp.innerHTML = `📊 <strong>$${total}/mo</strong> stack. You need ~<strong>$${Math.ceil(total * 3)}/mo MRR</strong> to be profitable (3x rule). That's ${Math.ceil(total * 3 / 29)} users at $29/mo.`;
  } else {
    comp.innerHTML = `⚠️ <strong>$${total}/mo</strong> is significant. Make sure your MRR justifies it. Consider downgrading tools you don't fully use.`;
  }
}

function shareStack() {
  const total = document.getElementById('monthly-cost').textContent;
  const activeTools = tools.filter(t => selected[t.id] !== -1).map(t => t.name).join('+');
  const url = `https://stillnotathing.com/calc?stack=${encodeURIComponent(activeTools)}&cost=${total}`;
  const title = `My indie hacker stack costs $${total}/month — ${activeTools}`;

  if (navigator.share) {
    navigator.share({ title, url });
  } else {
    navigator.clipboard.writeText(url);
    document.getElementById('toast').textContent = 'Stack link copied! ✓';
    document.getElementById('toast').classList.add('show');
    setTimeout(() => document.getElementById('toast').classList.remove('show'), 2500);
  }
}

function copyBadge() {
  const total = document.getElementById('monthly-cost').textContent;
  const badge = `[![Stack Cost $${total}/mo](https://stillnotathing.com/.netlify/functions/badge?tool=stack&cost=${total})](https://stillnotathing.com/calc)`;
  navigator.clipboard.writeText(badge);
  document.getElementById('toast').textContent = 'Badge copied! Paste in your GitHub README 🔖';
  document.getElementById('toast').classList.add('show');
  setTimeout(() => document.getElementById('toast').classList.remove('show'), 2500);
}

// Load from URL params
const params = new URLSearchParams(window.location.search);
if (params.get('stack')) {
  const stackTools = params.get('stack').split('+');
  // highlight tools mentioned
}

renderTools();
updateTotal();
</script>
</body>
</html>
