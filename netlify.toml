[build]
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap-dynamic"
  status = 200
  force = true

[[redirects]]
  from = "/guides/*"
  to = "/.netlify/functions/page-meta/guide/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/guides"
  to = "/.netlify/functions/page-meta/guides"
  status = 200
  force = true

[[redirects]]
  from = "/tools"
  to = "/.netlify/functions/page-meta/tools"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
