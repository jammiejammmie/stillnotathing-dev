[build]
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap-dynamic"
  status = 200
  force = true

[[redirects]]
  from = "/guides/:id"
  to = "/.netlify/functions/page-meta?mode=guide&id=:id"
  status = 200

[[redirects]]
  from = "/guides"
  to = "/.netlify/functions/page-meta?mode=guides"
  status = 200

[[redirects]]
  from = "/tools"
  to = "/.netlify/functions/page-meta?mode=tools"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
